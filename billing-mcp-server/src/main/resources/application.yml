server:
  port: 8081

spring:
  application:
    name: billing-mcp-server
  datasource:
    url: jdbc:h2:mem:billingdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# MCP Server Configuration (assuming standard properties)
spring.ai.mcp.server.transport: sse
