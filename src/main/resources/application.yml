spring:
  application:
    name: enterprise-agent-swarm
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:billingdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-mock-key}
      chat:
        options:
          model: gpt-3.5-turbo

server:
  port: 8080
